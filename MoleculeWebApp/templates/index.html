<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A tool to analyze molecular stereochemistry from SMILES strings.">
    <title>StereoChem Explorer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <h1>StereoChem <span class="highlight">Explorer</span></h1>
            <p>Analyze molecular stereochemistry interactively</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="smiles-input" placeholder="Enter SMILES (e.g. C1CCC(C1)C(C)O)" autocomplete="off">
                    <button id="analyze-btn" aria-label="Analyze SMILES string">
                        <span class="btn-text">Analyze</span>
                        <div class="spinner hidden" id="loading-spinner"></div>
                    </button>
                </div>
                <div class="suggestions">
                    <span>Try: </span>
                    <button class="try-btn" data-smiles="CC1CCC2C(C1)C3CCC4=CC(=O)OC5C4C3(C2O5)O">Artemisinin</button>
                    <button class="try-btn" data-smiles="CC(C)CC1C(=O)NC(C(=O)NC(C(=O)O)C(C)O)C(C)C">Antibiotic fragment</button>
                </div>
                <div class="error-msg hidden" id="error-msg"></div>
            </div>

            <div class="results-section hidden" id="results-section">
                <div class="results-grid">
                    <div class="mol-image-container glass-panel-inner fade-in-up" style="animation-delay: 0.1s;">
                        <h3>Molecular Structure</h3>
                        <div class="image-wrapper hint-highlight">
                            <img id="mol-image" src="" alt="Molecule Structure Image">
                        </div>
                    </div>
                    
                    <div class="config-container glass-panel-inner fade-in-up" style="animation-delay: 0.3s;">
                        <h3>Chiral Centers</h3>
                        <div class="stats">
                            <p>Total Stereocenters: <span id="chiral-count" class="badge">0</span></p>
                        </div>
                        <div class="table-container">
                            <table id="config-table">
                                <thead>
                                    <tr>
                                        <th>Atom Index</th>
                                        <th>Configuration</th>
                                    </tr>
                                </thead>
                                <tbody id="config-tbody">
                                    <!-- Rows generated dynamically -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
